name: Python Quality Check

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  pylint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pylint flake8

      - name: Run Flake8
        run: |
          flake8 .

      - name: Run Pylint
        run: |
          pylint *.py
